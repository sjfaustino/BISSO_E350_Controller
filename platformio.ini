# BISSO v4.2 Bridge Saw Controller - PlatformIO Configuration
# Simplified, proven working configuration

[platformio]
default_envs = esp32-s3-devkitc-1

# ============================================================================
# SINGLE UNIFIED ENVIRONMENT - All builds use this
# ============================================================================
[env:esp32-s3-devkitc-1]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
upload_speed = 460800

# Build flags - Optimized for production
build_flags = 
    -O2
    -Wl,--gc-sections
    -ffunction-sections
    -fdata-sections
    -I include/
    -I src/
    -DBOARD_HAS_PSRAM
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DLOG_LEVEL=LOG_LEVEL_INFO
    -DENABLE_SERIAL_LOGGING=1

# Upload settings
upload_protocol = esptool

# Monitor filters for serial output
monitor_filters = 
    default
    esp32_exception_decoder

# Libraries
lib_deps = 
    bblanchon/ArduinoJson@^7.0.0

# SPIFFS for web files
board_build.partitions = default.csv
board_build.f_flash = 80000000L
board_build.flash_mode = dio
